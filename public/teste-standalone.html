<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Standalone</title>
</head>
<body>
    <div id="root"></div>
    
    <script>
        console.log('🔥 TESTE STANDALONE: Script carregado!')
        
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🔥 TESTE STANDALONE: DOM carregado!')
            
            const root = document.getElementById('root')
            if (root) {
                root.innerHTML = `
                    <div style="
                        padding: 50px; 
                        background: linear-gradient(45deg, #ff6b6b, #4ecdc4); 
                        color: white; 
                        font-family: Arial; 
                        text-align: center;
                        min-height: 100vh;
                        font-size: 24px;
                    ">
                        <h1>🔥 TESTE STANDALONE FUNCIONOU!</h1>
                        <p>Este é um arquivo HTML puro, sem Vite.</p>
                        <p>Se funciona aqui mas não no Vite, o problema é o Vite.</p>
                        <p>Horário: ${new Date().toLocaleString()}</p>
                    </div>
                `
                console.log('🔥 TESTE STANDALONE: HTML inserido!')
            } else {
                console.error('🔥 TESTE STANDALONE: Root não encontrado!')
            }
        })
        
        console.log('🔥 TESTE STANDALONE: Script executado!')
    </script>
</body>
</html>
